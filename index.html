<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/sparky.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Tokichan" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="/manifest.json" />
    <title>Tokichan</title>
    <script>
      // Prevent white flash on page load by applying theme immediately
      (function () {
        var colorMode = localStorage.getItem("colorMode") || "system";
        var isDark =
          colorMode === "dark" ||
          (colorMode === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (isDark) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <style>
      /* Critical CSS to prevent white flash - matches globals.css dark theme */
      html {
        background-color: hsl(0 0% 100%);
      }
      html.dark {
        background-color: hsl(0 0% 3.9%);
      }
      body {
        background-color: inherit;
        margin: 0;
      }

      /* Thin transparent scrollbars globally */
      * {
        scrollbar-width: thin;
        scrollbar-color: transparent transparent;
      }
      *::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      *::-webkit-scrollbar-track {
        background: transparent;
      }
      *::-webkit-scrollbar-thumb {
        background: rgba(128, 128, 128, 0.25);
        border-radius: 3px;
      }
      *::-webkit-scrollbar-corner {
        background: transparent;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/bootstrap.jsx"></script>
  </body>
</html>
